version: "3.8"

services:
  syncthing:
    image: syncthing/syncthing
    container_name: syncthing
    network_mode: host
    hostname: omni
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./downloads:/var/syncthing:Z
      - ./sync:/var/config_syncthing:Z
    command: ["--home", "/var/config_syncthing", "--gui-address", "0.0.0.0:8384"]
    ports:
      - 8000:8384
      - 22000:22000/tcp
      - 21027:21027/udp
    restart: unless-stopped

  geoffrey-bot:
    image: ghcr.io/toodaniels/geoffrey_telegram:main
    container_name: geoffrey-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - /mnt/avivo:/app/avivo:rw

  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: myjellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Mexico_City
    user: "1000:1000"
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
      - "1900:1900/udp"
    volumes:
      - $HOME/jellyfin/config:/config:Z
      - $HOME/jellyfin/cache:/cache:Z
      - ./downloads:/media:rw
      - /mnt/avivo:/mnt/avivo:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    environment:
      - TZ=America/Mexico_City
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    privileged: true
    network_mode: host

